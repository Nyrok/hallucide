<!doctype html>
<html lang="fr" data-fr-scheme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#000091" />
  <title>Hallucide, vérification par les sources officielles</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@gouvfr/dsfr@1.14.4/dist/dsfr.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@gouvfr/dsfr@1.14.4/dist/utility/utility.min.css" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="hd-app">

    <!-- En-tête sobre : identité + contrôles (pas de bloc-marque Marianne) -->
    <header class="hd-header">
      <div class="hd-header__brand">
        <img src="/static/logo-assemblee.png" alt="Assemblée nationale" class="hd-header__logo" />
        <p class="hd-header__title">Hallucide</p>
        <p class="hd-header__tagline">Chaque affirmation est vérifiée contre la source officielle.</p>
      </div>
      <div class="hd-header__controls">
        <!-- Les 3 providers sont réellement câblés (ui/server.py::_MODEL_PROVIDERS).
             Un modèle sans clé dans .env affiche « moteur non connecté » : on ne
             fait JAMAIS semblant d'utiliser un modèle qu'on n'appelle pas. -->
        <select id="model" class="fr-select" title="Modèle de décomposition">
          <option value="claude" selected>Claude</option>
          <option value="mistral">Mistral</option>
          <option value="gemini">Gemini</option>
        </select>
        <!-- Tri des candidats en recherche libre : pertinence (reranking
             lexical déterministe) ou date (le plus récent d'abord). -->
        <select id="sort" class="fr-select" title="Tri des résultats (recherche libre)">
          <option value="pertinence" selected>Plus pertinent</option>
          <option value="recent">Plus récent</option>
        </select>
      </div>
    </header>

    <!-- Fil de conversation (rempli par app.js) -->
    <main id="thread" class="hd-thread" aria-live="polite"></main>

    <!-- Saisie -->
    <form id="composer" class="hd-composer">
      <div id="route-slot"></div>
      <div class="hd-composer__row">
        <textarea id="input" class="fr-input"
                  placeholder="Posez une question"
                  rows="1" autocomplete="off">À quelles commissions fait partie Yaël Braun-Pivet depuis sa dernière législature ?</textarea>
        <button type="submit" id="send" class="fr-btn">Vérifier</button>
      </div>
      <p class="fr-hint-text hd-composer__hint">Entrée pour envoyer, Maj+Entrée pour aller à la ligne. Rien n'est simulé : si le moteur n'est pas connecté, l'interface le dit.</p>
    </form>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
